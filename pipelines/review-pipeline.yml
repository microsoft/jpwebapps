trigger: none

variables:
  ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
    rootpath: /blog-review/$(Build.SourceBranchName)
  ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
    rootpath: /blog-review/pr$(System.PullRequest.PullRequestId)

stages:
- template: stages/hexo-generate.yml
  parameters:
    rootpath: $(rootpath)
