parameters:
  branch: 'new-gh-pages'

stages:
- stage: 
  displayName: 'Publish blog contents to GitHub Pages'
  jobs:
  - deployment: 
    variables:
    - group: blog-publish-to-prod
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'blog-prod'
    strategy:
      runOnce:
        deploy:
          steps: 
          - script: |
              cd $(Build.ArtifactStagingDirectory)
              git clone -b ${{ parameters.branch }} https://github.com/microsoft/jpwebapps.git
              rm -rf $(Build.ArtifactStagingDirectory)/jpwebapps/*
              ls -a $(Build.ArtifactStagingDirectory)/jpwebapps
            displayName: 'Git clone and remove all contents of the current version'

          - task: ExtractFiles@1
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/drop/jpwebapps.zip'
              cleanDestinationFolder: false
              destinationFolder: '$(Agent.TempDirectory)/jpwebapps'

          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Agent.TempDirectory)/jpwebapps'
              Contents: '**'
              TargetFolder: '$(Build.ArtifactStagingDirectory)/jpwebapps'
              OverWrite: true

          - script: |
              echo $(GITHUB_TOKEN)
              cd $(Build.ArtifactStagingDirectory)/jpwebapps
              git config --global user.name  "jpwebappsblog-automation"
              git config --global user.email "jpwebappsblog-automation@users.noreply.github.com"
              git add .
              git commit -m "Publish from jpwebappsblog pipeline, commit: $(Build.SourceVersion)"
              git log -1 --stat
              git push https://$(GITHUB_TOKEN)@github.com/microsoft/jpwebapps.git
            displayName: 'Push to jpwebapps on GitHub'
